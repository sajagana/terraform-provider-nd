---
provider:
  name: nd
  attributes:
    - model_name: username
      tf_name: username
      type: String
      mandatory: true
      description: NDFC Login credentials - user. Environment variable `ND_USERNAME` can be used to override the provider configuration.
    - model_name: password
      sensitive: true
      tf_name: password
      type: String
      mandatory: true
      description: NDFC Login credentials - password. Environment variable `ND_PASSWORD` can be used to override the provider configuration.
    - model_name: domain
      tf_name: domain
      type: String
      mandatory: false
      description: NDFC Login credentials - domain. Environment variable `ND_DOMAIN` can be used to override the provider configuration.
    - model_name: host
      tf_name: url
      type: String
      mandatory: true
      description: URL to connect to NDFC - Environment variable `ND_URL` can be used to override the provider configuration.
    - model_name: insecure
      tf_name: insecure
      type: Bool
      default_value: false
      description: Controls whether ND server's certificate chain and host name is verified. This can also be set as the `ND_INSECURE` (true or false) environment variable.
    - model_name: timeout
      tf_name: timeout
      type: Int64
      min_int: 1
      description: NDFC HTTP request timeout in seconds - timeout. Environment variable `ND_TIMEOUT` can be used to override the provider configuration.
    - model_name: max_retries
      tf_name: max_retries
      type: Int64
      min_int: 0
      description: Maximum number of retries for HTTP requests. Environment variable `ND_MAX_RETRIES` can be used to override the provider configuration.