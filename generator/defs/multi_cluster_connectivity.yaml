# API Endpoints:
#   infra_nd_4.2.1.json:
#     GET    /clusters                      - Get a list of remote clusters
#     POST   /clusters                      - Onboard an APIC or Nexus Dashboard cluster
#     GET    /clusters/{name}               - Get a remote cluster
#     PUT    /clusters/{name}               - Modify an onboarded cluster
#     POST   /clusters/{name}/remove        - Remove a remote cluster
#     POST   /clusterActions/disconnectFromMultiCluster - Delete local ND Multi-Cluster data
#
# API Payload Structure (POST /clusters):
#   {
#     "spec": {
#       "onboardUrl": "198.18.133.203",
#       "clusterType": "ND",
#       "credentials": {
#         "user": "admin",
#         "password": "password",
#         "loginDomain": "local"
#       },
#       "location": {
#         "latitude": 37.7749,
#         "longitude": -122.4194
#       },
#       "nd": {
#         "multiClusterLoginDomainName": "my-domain"
#       },
#       "aci": {
#         "name": "apic1",
#         "licenseTier": "premier",
#         "securityDomain": "all",
#         "verifyCA": false,
#         "orchestration": { "status": "enabled" },
#         "telemetry": {
#           "status": "enabled",
#           "network": "inband",
#           "epg": "uni/tn-infra/...",
#           "streamingProtocol": "ipv4"
#         }
#       },
#       "annotation": { "key": "value" }
#     }
#   }
#
# API Response Structure (GET /clusters/{name}):
#   {
#     "spec": {
#       "name": "nd1",
#       "clusterType": "ND",
#       "onboardUrl": "198.18.133.203",
#       "location": { "latitude": 37.7749, "longitude": -122.4194 },
#       "nd": { ... },
#       "aci": { ... }
#     },
#     "status": {
#       "state": "Up",
#       "version": "4.2.1",
#       "local": false,
#       "primaryCluster": false,
#       "virtual": false,
#       "controllers": [ ... ],
#       "lastUpdate": { "time": "...", "message": "..." }
#     }
#   }
#
# Container Shorthand (used in "# Used in:" comments below):
#   Onboard = OnboardClusterSpec  (POST /clusters)
#   Edit    = EditClusterSpec     (PUT  /clusters/{name})
#   Get     = ClusterSpec         (GET  /clusters/{name} -> spec)
#   Status  = ClusterStatus       (GET  /clusters/{name} -> status)
#   Remove  = RemoveCluster       (POST /clusters/{name}/remove)
#
# Note: OnboardAPICCluster (used by Onboard) has 'aci.name' field.
#       EditAPICCluster (used by Edit and Get) does NOT have 'aci.name'.


resource:
  name: multi_cluster_connectivity
  generate_tf_resource: true
  skip_equality: true
  attributes:

  - model_name: name
    tf_name: id
    description: Terraform resource ID, set to the cluster name for ease of use.
    type: String
    computed: true
    payload_hide: true

  # -------------------------------------------------------------------------
  # Top-level spec attributes
  # -------------------------------------------------------------------------

  # Schema:  OnboardClusterSpec -> onboardUrl
  # Payload: spec -> onboardUrl
  # Type: string; Description: IP address or FQDN used to onboard the cluster
  # Used in: Onboard (POST), Edit (PUT), Get (GET)
  - model_name: onboardUrl
    tf_name: hostname
    description: IP address or FQDN used to onboard the cluster. For ND clusters, using an FQDN will enable cross-launch to this cluster from other ND clusters using an FQDN.
    type: String
    mandatory: true
    ndfc_nested:
    - spec
    example: 198.18.133.203

  # Schema:  OnboardClusterSpec -> clusterType
  # Payload: spec -> clusterType
  # Allowed values: [ND, APIC]
  # Used in: Onboard (POST), Get (GET)
  - model_name: clusterType
    tf_name: cluster_type
    description: Specify a Nexus Dashboard or APIC cluster
    type: String
    mandatory: true
    ndfc_nested:
    - spec
    example: ND

  # -------------------------------------------------------------------------
  # spec -> credentials (used for onboard POST and remove POST)
  # -------------------------------------------------------------------------

  # Schema:  OnboardClusterSpec -> credentials ($ref clusterCredentials) -> user
  # Payload: spec -> credentials -> user
  # Used in: Onboard (POST), Edit (PUT), Remove (POST)
  - model_name: user
    tf_name: username
    description: Username for authentication with the remote cluster
    type: String
    mandatory: true
    ndfc_nested:
    - spec
    - credentials
    example: admin

  # Schema:  OnboardClusterSpec -> credentials ($ref clusterCredentials) -> password
  # Payload: spec -> credentials -> password
  # Used in: Onboard (POST), Edit (PUT), Remove (POST)
  - model_name: password
    tf_name: password
    description: Password for authentication with the remote cluster
    type: String
    mandatory: true
    sensitive: true
    # payload_hide: true
    ndfc_nested:
    - spec
    - credentials
    example: password

  # Schema:  OnboardClusterSpec -> credentials ($ref clusterCredentials) -> loginDomain
  # Payload: spec -> credentials -> loginDomain
  # Used in: Onboard (POST), Edit (PUT), Remove (POST)
  - model_name: loginDomain
    tf_name: login_domain
    description: Login domain for authentication with the remote cluster
    type: String
    optional: true
    ndfc_nested:
    - spec
    - credentials
    example: local

  # -------------------------------------------------------------------------
  # spec -> location
  # -------------------------------------------------------------------------

  # Schema:  OnboardClusterSpec -> location ($ref locationDetails) -> latitude
  # Payload: spec -> location -> latitude
  # Min: -90; Max: 90
  # Used in: Onboard (POST), Edit (PUT), Get (GET)
  - model_name: latitude
    tf_name: latitude
    description: Latitude in decimal degrees
    type: Float64
    optional: true
    ndfc_nested:
    - spec
    - location
    example: 37.7749

  # Schema:  OnboardClusterSpec -> location ($ref locationDetails) -> longitude
  # Payload: spec -> location -> longitude
  # Min: -180; Max: 180
  # Used in: Onboard (POST), Edit (PUT), Get (GET)
  - model_name: longitude
    tf_name: longitude
    description: Longitude in decimal degrees
    type: Float64
    optional: true
    ndfc_nested:
    - spec
    - location
    example: -122.4194

  # -------------------------------------------------------------------------
  # spec -> aci (APIC-specific configuration)
  # -------------------------------------------------------------------------

  # # Schema:  OnboardClusterSpec -> aci ($ref OnboardAPICCluster) -> name
  # # Payload: spec -> aci -> name
  # # Pattern: ^[a-zA-Z0-9]([a-zA-Z0-9-]{0,62}[a-zA-Z0-9])?$
  # # Used in: Onboard (POST) only — Edit (PUT) and Get (GET) do NOT have this field
  # - model_name: name
  #   tf_name: fabric_name
  #   description: Name used for this ACI fabric (APIC clusters) or display name for the cluster
  #   type: String
  #   optional: true
  #   ndfc_nested:
  #   - spec
  #   - aci
  #   example: apic1

  # Schema:  OnboardClusterSpec -> aci ($ref OnboardAPICCluster) -> licenseTier
  # Payload: spec -> aci -> licenseTier
  # Default: essentials; Allowed values: [essentials, advantage, premier]
  # Used in: Onboard (POST), Edit (PUT), Get (GET)
  - model_name: licenseTier
    tf_name: license_tier
    description: Tier of license to be used with this fabric on this cluster
    type: String
    optional: true
    # default_value: essentials
    ndfc_nested:
    - spec
    - aci
    example: premier

  # Schema:  OnboardClusterSpec -> aci ($ref OnboardAPICCluster) -> securityDomain
  # Payload: spec -> aci -> securityDomain
  # Used in: Onboard (POST), Edit (PUT), Get (GET)
  - model_name: securityDomain
    tf_name: security_domain
    description: Security domain access for the APIC cluster
    type: String
    optional: true
    ndfc_nested:
    - spec
    - aci
    example: all

  # Schema:  OnboardClusterSpec -> aci ($ref OnboardAPICCluster) -> verifyCA
  # Payload: spec -> aci -> verifyCA
  # Used in: Onboard (POST), Edit (PUT), Get (GET)
  - model_name: verifyCA
    tf_name: verify_ca
    description: Verify APIC CA using one of the trusted CAs configured on the Nexus Dashboard
    type: Bool
    ndfc_type: bool
    optional: true
    ndfc_nested:
    - spec
    - aci
    example: false

  # -------------------------------------------------------------------------
  # spec -> aci -> orchestration
  # -------------------------------------------------------------------------

  # Schema:  OnboardClusterSpec -> aci ($ref OnboardAPICCluster) -> orchestration ($ref APICOrchestration) -> status
  # Payload: spec -> aci -> orchestration -> status
  # Default: disabled; Allowed values: [enabled, disabled]
  # Used in: Onboard (POST), Edit (PUT), Get (GET)
  - model_name: status
    tf_name: orchestration_status
    description: Desired status of the orchestration feature for APIC cluster
    type: String
    optional: true
    # default_value: disabled
    ndfc_nested:
    - spec
    - aci
    - orchestration
    example: enabled

  # -------------------------------------------------------------------------
  # spec -> aci -> telemetry
  # -------------------------------------------------------------------------

  # Schema:  OnboardClusterSpec -> aci ($ref OnboardAPICCluster) -> telemetry ($ref APICTelemetry) -> status
  # Payload: spec -> aci -> telemetry -> status
  # Default: disabled; Allowed values: [enabled, disabled]
  # Used in: Onboard (POST), Edit (PUT), Get (GET)
  - model_name: status
    tf_name: telemetry_status
    description: Desired status of the telemetry feature for APIC cluster
    type: String
    optional: true
    # default_value: disabled
    ndfc_nested:
    - spec
    - aci
    - telemetry
    example: enabled

  # Schema:  OnboardClusterSpec -> aci ($ref OnboardAPICCluster) -> telemetry ($ref APICTelemetry) -> network
  # Payload: spec -> aci -> telemetry -> network
  # Default: inband; Allowed values: [inband, outOfBand]
  # Used in: Onboard (POST), Edit (PUT), Get (GET)
  - model_name: network
    tf_name: telemetry_network
    description: Desired connectivity for network traffic (telemetry)
    type: String
    optional: true
    # default_value: inband
    ndfc_nested:
    - spec
    - aci
    - telemetry
    example: inband

  # Schema:  OnboardClusterSpec -> aci ($ref OnboardAPICCluster) -> telemetry ($ref APICTelemetry) -> epg
  # Payload: spec -> aci -> telemetry -> epg
  # Used in: Onboard (POST), Edit (PUT), Get (GET)
  - model_name: epg
    tf_name: telemetry_epg
    description: APIC End Point Group (EPG) Distinguished Name (DN) for telemetry
    type: String
    optional: true
    ndfc_nested:
    - spec
    - aci
    - telemetry
    example: uni/tn-infra/ap-access/epg-default

  # Schema:  OnboardClusterSpec -> aci ($ref OnboardAPICCluster) -> telemetry ($ref APICTelemetry) -> streamingProtocol
  # Payload: spec -> aci -> telemetry -> streamingProtocol
  # Default: ipv4; Allowed values: [ipv4, ipv6]
  # Used in: Onboard (POST), Edit (PUT), Get (GET)
  - model_name: streamingProtocol
    tf_name: telemetry_streaming_protocol
    description: Telemetry Streaming Protocol
    type: String
    optional: true
    # default_value: ipv4
    ndfc_nested:
    - spec
    - aci
    - telemetry
    example: ipv4

  # -------------------------------------------------------------------------
  # spec -> nd (ND-specific configuration)
  # -------------------------------------------------------------------------

  # Schema:  OnboardClusterSpec -> nd ($ref OnboardNDCluster) -> multiClusterLoginDomainName
  # Payload: spec -> nd -> multiClusterLoginDomainName
  # Used in: Onboard (POST), Get (GET)
  - model_name: multiClusterLoginDomainName
    tf_name: multi_cluster_login_domain_name
    description: When set, ND will create a login domain on the local cluster and the cluster to be registered. The new login domain will enable cross-launch between clusters without an external authentication provider.
    type: String
    optional: true

    ndfc_nested:
    - spec
    - nd
    example: my-mc-domain

  # -------------------------------------------------------------------------
  # spec -> annotation
  # -------------------------------------------------------------------------

  # Schema:  OnboardClusterSpec -> annotation
  # Payload: spec -> annotation
  # Type: object with additionalProperties string (key/value string annotations)
  # Used in: Onboard (POST), Edit (PUT)
  # - model_name: annotation
  #   tf_name: annotation
  #   description: Custom key/value string annotations
  #   type: Map
  #   optional: true
  #   ndfc_nested:
  #   - spec
  #   example: key1

  # - model_name: key
  #   tf_name: annotation_key
  #   description: Custom key/value string annotations
  #   type: String
  #   optional: true
  #   ndfc_nested:
  #   - annotation
  #   - spec
  #   example: key1


  # - model_name: value
  #   tf_name: annotation_value
  #   description: Custom key/value string annotations
  #   type: String
  #   optional: true
  #   ndfc_nested:
  #   - annotation
  #   - spec
  #   example: key1

  # Schema:  ClusterSpec -> name / EditClusterSpec -> name
  # Payload: spec -> name
  # Used in: Edit (PUT), Get (GET)
  - model_name: name
    tf_name: cluster_name
    description: Name of the remote cluster as reported by the API
    type: String
    optional: true
    computed: true
    ndfc_nested:
    - spec
    example: nd1

  # -------------------------------------------------------------------------
  # Status attributes (computed / read-only from GET response)
  # -------------------------------------------------------------------------
  # Schema:  ClusterStatus
  # Payload: status
  # Default: Up; Allowed values: [Up, Down, PendingRegister]
  # Used in: Status (GET)
  # - model_name: status
  #   tf_name: status
  #   description: Status of the cluster
  #   type: Map
  #   computed: true
  #   omitempty: true
  #   example: Up

  # Schema:  ClusterStatus -> state
  # Payload: status -> state
  # Default: Up; Allowed values: [Up, Down, PendingRegister]
  # Used in: Status (GET)
  - model_name: state
    tf_name: state
    description: Status of the cluster
    type: String
    computed: true

    ndfc_nested:
    - status
    example: Up

  # Schema:  ClusterStatus -> version
  # Payload: status -> version
  # Used in: Status (GET)
  - model_name: version
    tf_name: version
    description: Version of the remote cluster
    type: String
    computed: true

    ndfc_nested:
    - status
    example: 4.2.1

  # Schema:  ClusterStatus -> local
  # Payload: status -> local
  # Used in: Status (GET)
  - model_name: local
    tf_name: local
    description: For ND, this cluster is the local cluster. For APIC, this cluster is managed by the local cluster.
    type: Bool
    ndfc_type: bool
    computed: true

    ndfc_nested:
    - status
    example: false

  # Schema:  ClusterStatus -> primaryCluster
  # Payload: status -> primaryCluster
  # Used in: Status (GET)
  - model_name: primaryCluster
    tf_name: primary_cluster
    description: This cluster manages all connected ND or APIC clusters
    type: Bool
    ndfc_type: bool
    computed: true

    ndfc_nested:
    - status
    example: false

  # Schema:  ClusterStatus -> virtual
  # Payload: status -> virtual
  # Used in: Status (GET)
  - model_name: virtual
    tf_name: virtual
    description: This is a virtual cluster
    type: Bool
    ndfc_type: bool
    computed: true
    ndfc_nested:
    - status
    example: false

  # -------------------------------------------------------------------------
  # Remove cluster attributes (used in DELETE/remove operation)
  # -------------------------------------------------------------------------

  # Schema:  RemoveCluster -> force
  # Payload: force
  # Used in: Remove (POST)
  - model_name: force
    tf_name: force_remove
    description: Ensures removal will succeed in the case the remote cluster is not healthy or communicable
    type: Bool
    ndfc_type: bool
    optional: true
    # payload_hide: true
    example: false

  # -------------------------------------------------------------------------
  # Edit cluster attributes (used in PUT operation)
  # -------------------------------------------------------------------------

  # Schema:  EditClusterSpec -> reRegister
  # Payload: spec -> reRegister
  # Used in: Edit (PUT)
  - model_name: reRegister
    tf_name: re_register
    description: Performs onboarding with the cluster again, without needing to remove the cluster
    type: Bool
    ndfc_type: bool
    optional: true
    # payload_hide: true
    ndfc_nested:
    - spec
    example: false





# {"spec":{"onboardUrl":"10.15.0.128","clusterType":"ND","credentials":{"user":"admin","password":"cisco.123"},"location":{},"aci":{"licenseTier":"essentials","orchestration":{"status":"disabled"},"telemetry":{"status":"disabled","network":"inband","streamingProtocol":"ipv4"}}}}