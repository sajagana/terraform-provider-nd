resource:
  name: link
  generate_tf_resource: true
  skip_equality: true
  attributes:
  # Used in: all
  - model_name: linkId
    tf_name: link_id
    description: Unique identifier of the link.
    type: String
    computed: true
    payload_hide: true
    example: example_linkId
    include_empty: true

  # Used in: all
  - model_name: srcSwitchId
    tf_name: src_switch_id
    description: Unique identifier of the source switch.
    type: String
    optional: true
    example: example_srcSwitchId
    include_empty: true

  # Used in: all
  - model_name: dstSwitchId
    tf_name: dst_switch_id
    description: Unique identifier of the destination switch.
    type: String
    optional: true
    example: example_dstSwitchId
    include_empty: true

  # manage_nd_4.2.1.json -> linkBase -> srcFabricName
  # Used in: all
  - model_name: srcFabricName
    tf_name: src_fabric_name
    description: Name of the source fabric.
    type: String
    mandatory: true
    example: example_srcFabricName
    include_empty: true

  # manage_nd_4.2.1.json -> linkBase -> srcSwitchName
  # Used in: all
  - model_name: srcSwitchName
    tf_name: src_switch_name
    description: Name of the source device.
    type: String
    mandatory: true
    example: example_srcSwitchName
    include_empty: true

  # manage_nd_4.2.1.json -> linkBase -> srcInterfaceName
  # Used in: all
  - model_name: srcInterfaceName
    tf_name: src_interface_name
    description: Name of the source interface.
    type: String
    mandatory: true
    example: example_srcInterfaceName
    include_empty: true

  # manage_nd_4.2.1.json -> linkBase -> dstFabricName
  # Used in: all
  - model_name: dstFabricName
    tf_name: dst_fabric_name
    description: Name of the destination fabric.
    type: String
    mandatory: true
    example: example_dstFabricName
    include_empty: true

  # manage_nd_4.2.1.json -> linkBase -> dstSwitchName
  # Used in: all
  - model_name: dstSwitchName
    tf_name: dst_switch_name
    description: Name of the destination device.
    type: String
    mandatory: true
    example: example_dstSwitchName
    include_empty: true

  # manage_nd_4.2.1.json -> linkBase -> dstInterfaceName
  # Used in: all
  - model_name: dstInterfaceName
    tf_name: dst_interface_name
    description: Name of the destination interface.
    type: String
    mandatory: true
    example: example_dstInterfaceName
    include_empty: true

  # NEW: From Python class NDLinkModel -> srcClusterName (alias "srcClusterName")
  # Used in: all
  - model_name: srcClusterName
    tf_name: src_cluster_name
    description: Name of the source cluster.
    type: String
    optional: true
    example: example_srcClusterName
    include_empty: true

  # NEW: From Python class NDLinkModel -> dstClusterName (alias "dstClusterName")
  # Used in: all
  - model_name: dstClusterName
    tf_name: dst_cluster_name
    description: Name of the destination cluster.
    type: String
    optional: true
    example: example_dstClusterName
    include_empty: true

  # manage_nd_4.2.1.json -> linkReadOnly -> linkType
  # Used in: all
  - model_name: linkType
    tf_name: link_type
    description: Type of the link.
    type: String
    computed: true
    example: example_linkType
    include_empty: true

  # manage_nd_4.2.1.json -> templateConfig -> configData -> policyType
  # Discriminator field that determines which templateInputs fields are applicable
  # Allowed values: ['csrBgpOverIpsec', 'csrEvpnMultisiteOverlay', 'csrMultisiteUnderlay', 'ebgpVrfLite', 'iosXeNumbered', 'ipfmNumbered', 'ipv6LinkLocal', 'layer2Dci', 'layer3DciVrfLite', 'mplsOverlay', 'mplsUnderlay', 'multisiteOverlay', 'multisiteUnderlay', 'numbered', 'ospfVrfLite', 'preprovision', 'routedFabric', 'unnumbered', 'userDefined', 'vpcPeerKeepalive', 'vxlanAciEvpnOverlay', 'vxlanAciMultisiteUnderlay']
  # Used in: all
  - model_name: policyType
    tf_name: policy_type
    description: The link policy type. Determines the set of applicable templateInputs fields.
    type: String
    mandatory: true
    ndfc_nested:
    - configData
    example: numbered
    include_empty: true

  # =============================================================================
  # configData -> templateInputs (flat structure matching API payload)
  #
  # The fields below are the union of all templateInputs across all policy types.
  # Each attribute has an inline comment listing which policy types use it.
  # Not all fields apply to all policy types - only the fields for the chosen
  # policyType should be set. Extra fields are ignored by the API.
  #
  # NOTE: In the API payload, templateInputs is a flat object under configData:
#  # "configData": { "policyType": "...", "templateInputs": { <fields> } }
  # =============================================================================

  # manage_nd_4.2.1.json -> ipv6LinkLocal -> templateInputs -> srcInterfaceDescription
  # Used in: ipv6LinkLocal, numbered, unnumbered, vpcPeerKeepalive, ipfmNumbered, preprovision, iosXeNumbered, ebgpVrfLite, ospfVrfLite, layer3DciVrfLite, csrMultisiteUnderlay, multisiteUnderlay, vxlanAciMultisiteUnderlay, multisiteOverlay, vxlanAciEvpnOverlay, layer2Dci, mplsUnderlay, routedFabric
  # Max: 254
  - model_name: srcInterfaceDescription
    tf_name: src_interface_description
    description: Description for the source interface.
    type: String
    optional: true
    ndfc_nested:
    - configData
    - templateInputs
    example: example_srcInterfaceDescription
    include_empty: true

  # manage_nd_4.2.1.json -> ipv6LinkLocal -> templateInputs -> srcInterfaceConfig
  # Used in: ipv6LinkLocal, numbered, unnumbered, vpcPeerKeepalive, ipfmNumbered, preprovision, iosXeNumbered, ebgpVrfLite, ospfVrfLite, layer3DciVrfLite, csrMultisiteUnderlay, multisiteUnderlay, vxlanAciMultisiteUnderlay, multisiteOverlay, vxlanAciEvpnOverlay, layer2Dci, mplsUnderlay, routedFabric
  - model_name: srcInterfaceConfig
    tf_name: src_interface_config
    description: >-
      Source interface freeform configuration. All configurations should strictly match 'show run'
      output, with respect to case and newlines. Any mismatches will yield unexpected diffs during
      deployment.
    type: String
    optional: true
    ndfc_nested:
    - configData
    - templateInputs
    example: example_srcInterfaceConfig
    include_empty: true

  # manage_nd_4.2.1.json -> ipv6LinkLocal -> templateInputs -> dstInterfaceDescription
  # Used in: ipv6LinkLocal, numbered, unnumbered, vpcPeerKeepalive, ipfmNumbered, preprovision, iosXeNumbered, ebgpVrfLite, ospfVrfLite, layer3DciVrfLite, csrMultisiteUnderlay, multisiteUnderlay, vxlanAciMultisiteUnderlay, multisiteOverlay, vxlanAciEvpnOverlay, layer2Dci, mplsUnderlay, routedFabric
  # Max: 254
  - model_name: dstInterfaceDescription
    tf_name: dst_interface_description
    description: Description for the destination interface.
    type: String
    optional: true
    ndfc_nested:
    - configData
    - templateInputs
    example: example_dstInterfaceDescription
    include_empty: true

  # manage_nd_4.2.1.json -> ipv6LinkLocal -> templateInputs -> dstInterfaceConfig
  # Used in: ipv6LinkLocal, numbered, unnumbered, vpcPeerKeepalive, ipfmNumbered, preprovision, iosXeNumbered, ebgpVrfLite, ospfVrfLite, layer3DciVrfLite, csrMultisiteUnderlay, multisiteUnderlay, vxlanAciMultisiteUnderlay, multisiteOverlay, vxlanAciEvpnOverlay, layer2Dci, mplsUnderlay, routedFabric
  - model_name: dstInterfaceConfig
    tf_name: dst_interface_config
    description: >-
      Destination interface freeform configuration. All configurations should strictly match 'show
      run' output, with respect to case and newlines. Any mismatches will yield unexpected diffs
      during deployment.
    type: String
    optional: true
    ndfc_nested:
    - configData
    - templateInputs
    example: example_dstInterfaceConfig
    include_empty: true

  # manage_nd_4.2.1.json -> ipv6LinkLocal -> templateInputs -> interfaceAdminState
  # Used in: ipv6LinkLocal, numbered, unnumbered, vpcPeerKeepalive, ipfmNumbered, iosXeNumbered
  # Default: True
  - model_name: interfaceAdminState
    tf_name: interface_admin_state
    description: Admin state of the interface.
    type: Bool
    optional: true
    ndfc_nested:
    - configData
    - templateInputs
    ndfc_type: bool
    default_value: true
    example: true
    include_empty: true

  # manage_nd_4.2.1.json -> ipv6LinkLocal -> templateInputs -> mtu
  # Used in: ipv6LinkLocal, numbered, unnumbered, vpcPeerKeepalive, ipfmNumbered, preprovision, iosXeNumbered
  # Required in: ipfmNumbered, ipv6LinkLocal, numbered, unnumbered
  # Default: 9216; Min: 576; Max: 9216
  - model_name: mtu
    tf_name: mtu
    description: Interface MTU.
    type: Int64
    optional: true
    ndfc_nested:
    - configData
    - templateInputs
    default_value: 9216
    example: 9216
    include_empty: true

  # manage_nd_4.2.1.json -> ebgpVrfLite -> templateInputs -> linkMtu
  # Used in: ebgpVrfLite, ospfVrfLite, layer3DciVrfLite, multisiteUnderlay, mplsUnderlay, routedFabric
  # Default: 9216; Min: 576; Max: 9216
  - model_name: linkMtu
    tf_name: link_mtu
    description: Interface MTU.
    type: Int64
    optional: true
    ndfc_nested:
    - configData
    - templateInputs
    default_value: 9216
    example: 9216
