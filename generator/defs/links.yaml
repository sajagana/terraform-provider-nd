# =============================================================================
# Links Feature YAML Definition
# Generated from manage_nd_4.2.1.json and oneManage_nd_4.2.1.json
# =============================================================================
#
# API Endpoints (manage):
#   List links:   GET /appcenter/cisco/ndfc/api/v1/manage/links?fabric-name={fabricName}
#   Get link:     GET /appcenter/cisco/ndfc/api/v1/manage/links/{linkId}?fabric-name={fabricName}
#   Create link:  POST /appcenter/cisco/ndfc/api/v1/manage/links?fabric-name={fabricName}
#   Update link:  PUT /appcenter/cisco/ndfc/api/v1/manage/links/{linkId}?fabric-name={fabricName}
#   Delete link:  DELETE /appcenter/cisco/ndfc/api/v1/manage/links/{linkId}?fabric-name={fabricName}
#
# API Endpoints (oneManage / multi-cluster):
#   List links:   GET /appcenter/cisco/ndfc/api/v1/manage-one/manage/links?fabric-name={fabricName}
#   Get link:     GET /appcenter/cisco/ndfc/api/v1/manage-one/manage/links/{linkId}?fabric-name={fabricName}
#   Create link:  POST /appcenter/cisco/ndfc/api/v1/manage-one/manage/links?fabric-name={fabricName}
#   Update link:  PUT /appcenter/cisco/ndfc/api/v1/manage-one/manage/links/{linkId}?fabric-name={fabricName}
#   Delete link:  DELETE /appcenter/cisco/ndfc/api/v1/manage-one/manage/links/{linkId}?fabric-name={fabricName}
#
# Link Action Endpoints:
#   Export links: POST /appcenter/cisco/ndfc/api/v1/manage/linkActions/export?fabric-name={fabricName}
#   Import links: POST /appcenter/cisco/ndfc/api/v1/manage/linkActions/import?fabric-name={fabricName}
#   Remove links: POST /appcenter/cisco/ndfc/api/v1/manage/linkActions/remove?fabric-name={fabricName}
#
# Logical Links:
#   List:         GET /appcenter/cisco/ndfc/api/v1/manage/logicalLinks?fabric-name={fabricName}
#
# Link Policy Types (policyType discriminator in configData):
#   ipv6LinkLocal: IPv6 Link-Local intra-fabric link (spine-leaf/leaf-leaf)
#   numbered: Numbered (Point-to-Point) intra-fabric link
#   unnumbered: Unnumbered intra-fabric link
#   vpcPeerKeepalive: vPC Peer Keep-Alive link between vPC peer switches
#   ipfmNumbered: IPFM Numbered intra-fabric link
#   preprovision: Pre-provisioned intra-fabric link
#   iosXeNumbered: IOS-XE Numbered intra-fabric link
#   ebgpVrfLite: eBGP VRF Lite inter-fabric link (External/VRF-Lite connectivity)
#   ospfVrfLite: OSPF VRF Lite inter-fabric link
#   layer3DciVrfLite: Layer-3 DCI VRF Lite inter-fabric link
#   csrMultisiteUnderlay: CSR Multisite Underlay inter-fabric link
#   multisiteUnderlay: Multisite Underlay inter-fabric link (border-gateway to border-gateway)
#   vxlanAciMultisiteUnderlay: VXLAN-ACI Multisite Underlay inter-fabric link
#   csrEvpnMultisiteOverlay: CSR EVPN Multisite Overlay inter-fabric link
#   multisiteOverlay: Multisite EVPN Overlay inter-fabric link (border-gateway to border-gateway)
#   vxlanAciEvpnOverlay: VXLAN-ACI EVPN Overlay inter-fabric link
#   csrBgpOverIpsec: CSR BGP over IPSec inter-fabric link
#   layer2Dci: Layer-2 DCI inter-fabric link (trunk between fabrics)
#   mplsUnderlay: MPLS Underlay link (VXLAN to MPLS handoff)
#   mplsOverlay: MPLS Overlay link (BGP EVPN peering for MPLS handoff)
#   routedFabric: Routed Fabric link
#   userDefined: User-defined link with custom template
#
# API Payload Structure:
#   {
#     "links": [{
#       "srcFabricName": "...",
#       "srcSwitchId": "...",
#       "srcSwitchName": "...",
#       "srcInterfaceName": "...",
#       "dstFabricName": "...",
#       "dstSwitchId": "...",
#       "dstSwitchName": "...",
#       "dstInterfaceName": "...",
#       "configData": {
#         "policyType": "<policyType>",
#         "templateInputs": { ... }
#       }
#     }]
#   }
# =============================================================================




